name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend Testing Job
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run DXF parsing test
        run: |
          cd backend
          node test-complex-dxf.js

      - name: Check test output
        run: |
          if [ -f ../test-output-complex.json ]; then
            echo "✅ Test output generated successfully"
            wc -l ../test-output-complex.json
          else
            echo "❌ Test output not found"
            exit 1
          fi

  # Frontend Testing Job
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend code
        run: |
          cd frontend
          npm run lint --if-present
        continue-on-error: true

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          CI: true

  # Code Quality Check
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file sizes
        run: |
          echo "📊 Checking file sizes..."
          find backend frontend -name "*.js" -o -name "*.jsx" | head -20 | xargs wc -l

      - name: Check for TODOs
        run: |
          echo "🔍 Checking for TODO comments..."
          grep -r "TODO" backend/frontend --include="*.js" --include="*.jsx" || echo "✅ No TODOs found"

      - name: Validate DXF samples
        run: |
          echo "📐 Validating DXF sample files..."
          for file in samples/*.dxf; do
            if [ -f "$file" ]; then
              echo "✅ Found: $file"
              wc -l "$file"
            fi
          done

  # Integration Test
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    services:
      backend:
        image: node:18
        ports:
          - 3001:3001
        options: >-
          --health-cmd "curl -f http://localhost:3001/api/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Start backend server
        run: |
          cd backend
          npm run dev &
          sleep 10

      - name: Test health endpoint
        run: |
          curl -f http://localhost:3001/api/health || exit 1

      - name: Test DXF upload endpoint
        run: |
          curl -X POST \
            -F "file=@samples/simple-warehouse.dxf" \
            http://localhost:3001/api/model/upload

  # Build and Deploy (only on main branch)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Create deployment artifact
        run: |
          mkdir -p artifact
          cp -r backend/* artifact/
          cp -r frontend/dist artifact/frontend-dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: warehouse-3d-viz-build
          path: artifact/
          retention-days: 30

  # Notify on failure
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, integration-test]
    if: failure()

    steps:
      - name: Send notification
        run: |
          echo "❌ CI/CD Pipeline failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
